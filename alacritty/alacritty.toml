import = [
  "~/.config/dotfiles/alacritty/themes/catppuccin-latte.toml",
  "~/.config/dotfiles/alacritty/pwd_linux.toml",

  "C:\\Users\\70087700\\AppData\\Roaming\\dotfiles\\alacritty\\themes\\catppuccin-latte.toml",
  "C:\\Users\\70087700\\AppData\\Roaming\\dotfiles\\alacritty\\pwd_windows.toml"
]
live_config_reload = true

[window]
decorations = "full"
startup_mode = "Maximized"
opacity = 0.94
blur = true

[font]
size = 18

normal = { family = "Ubuntu Mono", style = "Regular" }
bold = { family = "Ubuntu Mono", style = "Regular" }
italic = { family = "Ubuntu Mono", style = "Regular" }
bold_italic = { family = "Ubuntu Mono", style = "Regular" }

[cursor]
style = { shape = "Block", blinking = "On" }

blink_interval = 500
blink_timeout = 0
unfocused_hollow = true

[mouse]
hide_when_typing = true

[keyboard]
bindings = [{ key = "T", mods = "Control", action = "CreateNewWindow" }]
